<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TropiStay - Browse Hotels</title>
    <link rel="stylesheet" href="style-local.css">
    
</head>
<body>
    <header>
        <nav>
            <div class="nav-bar">
                <img src="photo_logo/LOGO2.2.png" alt="logo" width="200px">
                <ul class="nav-links">
                  <! -- 
                    <li><a href="index.html">Home</a></li>
                    <li><a href="hotel_listing.html">Hotels</a></li>
                    <li><a href="account.html">My Account</a></li>
                -- >
                </ul>
            </div>
        </nav>
    </header>

    <main class="hotel-listing-container">
        <section class="filters-section">
            <h2>Find Your Perfect Stay</h2>
            <div class="filter-controls">
                <!-- Price Range Buttons -->
                <div class="filter-group">
                    <h3>Price Range</h3>
                    <div class="price-buttons">
                        <button class="price-btn" data-max-price="5000">Under ₱5,000</button>
                        <button class="price-btn" data-max-price="10000">₱5,000 - ₱10,000</button>
                        <button class="price-btn" data-max-price="15000">₱10,000 - ₱15,000</button>
                        <button class="price-btn" data-max-price="20000">Over ₱15,000</button>
                        <button class="price-btn active" data-max-price="">All Prices</button>
                    </div>
                </div>
                
                <!-- Star Rating Dropdown -->
                <div class="filter-group">
                    <h3>Star Rating</h3>
                    <select id="rating-filter">
                        <option value="">All Ratings</option>
                        <option value="5">★★★★★</option>
                        <option value="4">★★★★☆</option>
                        <option value="3">★★★☆☆</option>
                        <option value="2">★★☆☆☆</option>
                        <option value="1">★☆☆☆☆</option>
                    </select>
                </div>
                
                <!-- Amenities Checkboxes -->
                <div class="filter-group">
                    <h3>Amenities</h3>
                    <div class="amenities-checkboxes">
                        <label><input type="checkbox" name="amenities" value="wifi"> WiFi</label>
                        <label><input type="checkbox" name="amenities" value="pool"> Swimming Pool</label>
                        <label><input type="checkbox" name="amenities" value="beachfront"> Beachfront</label>
                        <label><input type="checkbox" name="amenities" value="restaurant"> Restaurant</label>
                        <label><input type="checkbox" name="amenities" value="spa"> Spa</label>
                        <label><input type="checkbox" name="amenities" value="aircon"> Air Conditioning</label>
                        <label><input type="checkbox" name="amenities" value="breakfast"> Free Breakfast</label>
                    </div>
                </div>
            </div>
        </section>

        
            <div class="hotel-cards" id="hotel-cards-container">
                <!-- Hotel cards will be populated by JavaScript -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-container">
          <div class="social-links">
            <a href="https://www.facebook.com/" class="social-link facebook">
              <img src="footer\facebook.png" width="20px" alt="Facebook Logo"> Facebook<br><span>Join us on Facebook</span>
            </a>
            <a href="https://twitter.com/i/flow/signup?lang=en" class="social-link twitter">
              <img src="footer\x.png" alt="Twitter Logo"> Twitter<br><span>Join us on   Twitter</span>
            </a>
            <a href="https://www.youtube.com/hashtag/youtubelink" class="social-link youtube">
              <img src="footer\png-transparent-round-youtube-logo.png" alt="YouTube Logo"> Youtube<br><span>Join us on Youtube</span>
            </a>
            <a href="https://www.instagram.com/accounts/login/?hl=en" class="social-link instagram">
              <img src="footer\instagram.jpg" alt="Instagram Logo"> Instagram<br><span>Join us on Instagram</span>
            </a>
            <br>
          </div>
          <div class="footer-logo">
            <img src="photo_logo\logo_IPT.png" alt="Logo" >
          </div>
          <div class="footer-text">
            <p>&copy; 2023 TropiStay App. All rights reserved.</p>
          </div>
        </div>
      </footer>

</body>
