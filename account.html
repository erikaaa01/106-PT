.booking-card {

 .account-bookings {
   max-width: 1200px;
  margin: 40px auto;
  padding: 20px;
}

.bookings-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 5px;
  margin-top: -40px;
}

.booking-search {
  padding: 8px 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* Table Styling */
.bookings-table table {
  width: 100%;
  border-collapse: collapse;
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
}

.bookings-table th,
.bookings-table td {
  padding: 14px;
  text-align: left;
  border-bottom: 1px solid #eee;
}

.bookings-table th {
  background-color: #f8f9fb;
  font-weight: 600;
  color: #333;
}

.bookings-table tr:hover {
  background-color: #f5f7fa;
}

/* Status Badge */
.status {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}

.status.confirmed {
  background: #e6f7ee;
  color: #00a859;
}

.status.pending {
  background: #fff4e5;
  color: #ff9800;
}

.status.cancelled {
  background: #fdecea;
  color: #d93025;
}

/* Customer Info */
.customer-info {
  font-size: 13px;
  color: #555;
}

.customer-info strong {
  display: block;
  color: #000;
}

.profile-menu {
  position: relative;
  display: inline-block;
  margin-left: 20px;
}

#profile-icon {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
}

.dropdown {
  display: none;
  position: absolute;
  right: 0;
  top: 50px;
  background: white;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 10px;
  width: 180px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  z-index: 100;
}

.dropdown p {
  font-size: 14px;
  margin-bottom: 10px;
  color: #333;
}

.dropdown button {
  width: 100%;
  padding: 8px;
  background: #d93025;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.dropdown button:hover {
  background: #b1271b;
}

/* ── Cancel Modal ── */
#cancel-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 999;
  align-items: center;
  justify-content: center;
}

.cancel-modal-box {
  background: white;
  padding: 35px 30px;
  border-radius: 12px;
  max-width: 420px;
  width: 90%;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.cancel-modal-box h3 {
  margin: 0 0 10px;
  font-size: 20px;
  color: #222;
}

.cancel-modal-box p {
  color: #666;
  margin-bottom: 25px;
  font-size: 14px;
  line-height: 1.5;
}

.cancel-modal-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
}

#close-modal {
  padding: 10px 24px;
  border: 1px solid #ccc;
  border-radius: 6px;
  cursor: pointer;
  background: white;
  font-size: 14px;
  color: #333;
}

#close-modal:hover {
  background: #f5f5f5;
}

#confirm-cancel {
  padding: 10px 24px;
  background: #d93025;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
}

#confirm-cancel:hover {
  background: #b1271b;
}

/* Cancel button inside table */
.cancel-btn {
  padding: 6px 14px;
  background: #d93025;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-size: 13px;
}

.cancel-btn:hover {
  background: #b1271b;
}

    <script src="accountbooking.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {

  // Ask the SERVER if this session is still logged in
  fetch("api/auth.php", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: "check" })
  })
  .then(res => res.json())
  .then(data => {
    if (!data.logged_in) {
      localStorage.removeItem("currentUser");
      localStorage.removeItem("userEmail");
      localStorage.setItem("isLoggedIn", "false");
      window.location.href = "SignLog.html";
      return;
    }

    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("userEmail", data.email);
    localStorage.setItem("currentUser", JSON.stringify(data));

    document.getElementById("user-email").textContent = data.email;

    const profileIcon = document.getElementById("profile-icon");
    const dropdown    = document.getElementById("dropdown-menu");

    profileIcon.addEventListener("click", (e) => {
      e.stopPropagation();
      dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
    });

    window.addEventListener("click", (e) => {
      if (!profileIcon.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.style.display = "none";
      }
    });

    document.getElementById("logout-btn").addEventListener("click", () => {
      fetch("api/auth.php", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "logout" })
      }).finally(() => {
        localStorage.removeItem("currentUser");
        localStorage.removeItem("userEmail");
        localStorage.setItem("isLoggedIn", "false");
        window.location.href = "SignLog.html";
      });
    });

    displayUserBookings();
  })
  .catch(() => {
    const isLoggedIn  = localStorage.getItem("isLoggedIn");
    const currentUser = JSON.parse(localStorage.getItem("currentUser"));
    if (isLoggedIn !== "true" || !currentUser) {
      window.location.href = "SignLog.html";
      return;
    }
    document.getElementById("user-email").textContent = currentUser.email;
    displayUserBookings();
  });

});
</script>
